name: kazakhstan_radio
version: 1.0.0+1
publish_to: 'none'

description: Қазақстан радио плеері / Казахстанское радио - Glassmorphism Radio Player

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  just_audio: ^0.9.40
  audio_service: ^0.18.15
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9
  lottie: ^3.1.0
  glass_kit: ^3.0.0
  shimmer: ^3.0.0
  animated_text_kit: ^4.2.2
  just_audio_background: ^0.0.1-beta.13
  audio_session: ^0.1.21
  shared_preferences: ^2.2.2
  share_plus: ^7.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/images/
